<!doctype html>
<html lang="ja">
	<head>
		<meta charset="UTF-8" />
		<title>{% block title %}デフォルトタイトル{% endblock %}</title>
		<link
			rel="stylesheet"
			href="{{ url_for('static', filename='css/dist/output.css') }}"
		/>
	</head>
	<body class="bg-gray-50">
		<header class="bg-white shadow p-4">
			<h1 class="text-xl font-bold text-blue-600">My Flask App</h1>
		</header>

		<main class="container mx-auto mt-6">
			{% block content %} {% endblock %}
		</main>

		<footer class="text-center p-10 text-gray-500">
			&copy; 2026 Flask Tutorial
		</footer>
	</body>
</html>
